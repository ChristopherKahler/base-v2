name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: base-linux-x86_64.tar.gz
            binary: base
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: base-windows-x86_64.zip
            binary: base.exe
          - target: aarch64-apple-darwin
            os: macos-14
            asset: base-darwin-aarch64.tar.gz
            binary: base

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/scripts/ast
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          strip staging/${{ matrix.binary }} || true
          cp scripts/ast/*.py staging/scripts/ast/
          cd staging
          tar -czf ../${{ matrix.asset }} ${{ matrix.binary }} scripts/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/scripts/ast | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          Copy-Item scripts/ast/*.py staging/scripts/ast/
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            base-linux-x86_64.tar.gz/base-linux-x86_64.tar.gz
            base-windows-x86_64.zip/base-windows-x86_64.zip
            base-darwin-aarch64.tar.gz/base-darwin-aarch64.tar.gz
          body: |
            ## Install

            ```bash
            npx chrisai
            ```

            Or download the binary for your platform below.

            **Chris AI Systems** · https://chrisai.cv/skool
